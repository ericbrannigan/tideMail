version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: tidemail-db
    environment:
      POSTGRES_DB: tidemail
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: